<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="stepGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3DA872"/>
      <stop offset="100%" stop-color="#228B55"/>
    </linearGradient>
    <linearGradient id="stepGrad2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#228B55"/>
      <stop offset="100%" stop-color="#1A7042"/>
    </linearGradient>
    <linearGradient id="stepGrad3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A7042"/>
      <stop offset="100%" stop-color="#155833"/>
    </linearGradient>
    <linearGradient id="stepGrad4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#155833"/>
      <stop offset="100%" stop-color="#0F4226"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8Z" fill="#228B55"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="#F2FBF5" rx="16"/>

  <!-- Connecting pipe -->
  <path d="M140,100 L175,100 L200,100 L225,100 L315,100 L340,100 L365,100 L490,100 L515,100 L540,100 L665,100 L690,100 L715,100"
        stroke="#C9EBDA" stroke-width="6" fill="none"/>
  <path d="M140,100 L175,100 L200,100 L225,100 L315,100 L340,100 L365,100 L490,100 L515,100 L540,100 L665,100 L690,100 L715,100"
        stroke="#74C39A" stroke-width="2" fill="none" stroke-dasharray="8,6"/>

  <!-- Arrow flow dots animated via CSS -->
  <circle cx="250" cy="100" r="5" fill="#228B55" opacity="0.8"/>
  <circle cx="420" cy="100" r="5" fill="#1A7042" opacity="0.8"/>
  <circle cx="595" cy="100" r="5" fill="#155833" opacity="0.8"/>

  <!-- Step 1: Biomass Input -->
  <g transform="translate(30, 55)">
    <rect x="0" y="0" width="110" height="90" rx="16" fill="url(#stepGrad1)" opacity="0.95"/>
    <!-- Biomass icon -->
    <g transform="translate(20, 10)">
      <!-- Straw/grass bundle -->
      <line x1="35" y1="0" x2="30" y2="32" stroke="#C9EBDA" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="45" y1="0" x2="42" y2="32" stroke="#AADCC0" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="25" y1="2" x2="22" y2="32" stroke="#C9EBDA" stroke-width="2" stroke-linecap="round"/>
      <line x1="55" y1="2" x2="52" y2="32" stroke="#AADCC0" stroke-width="2" stroke-linecap="round"/>
      <!-- Tie band -->
      <rect x="18" y="20" width="40" height="6" rx="3" fill="#155833" opacity="0.6"/>
    </g>
    <text x="55" y="62" text-anchor="middle" font-family="Outfit,sans-serif" font-size="9" font-weight="700" fill="white" opacity="0.9">BIOMASS</text>
    <text x="55" y="74" text-anchor="middle" font-family="Outfit,sans-serif" font-size="9" font-weight="600" fill="white" opacity="0.7">INPUT</text>
    <!-- Step number -->
    <circle cx="18" cy="18" r="10" fill="white" opacity="0.15"/>
    <text x="18" y="22" text-anchor="middle" font-family="Outfit" font-size="9" font-weight="800" fill="white">01</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M142,100 L172,100" stroke="#74C39A" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>

  <!-- Step 2: Pre-processing -->
  <g transform="translate(180, 55)">
    <rect x="0" y="0" width="110" height="90" rx="16" fill="url(#stepGrad2)" opacity="0.95"/>
    <!-- Shredder/grinder icon -->
    <g transform="translate(20, 8)">
      <rect x="5" y="0" width="60" height="18" rx="4" fill="rgba(255,255,255,0.15)"/>
      <rect x="5" y="22" width="60" height="18" rx="4" fill="rgba(255,255,255,0.1)"/>
      <!-- Gear teeth -->
      <rect x="10" y="2" width="6" height="14" rx="2" fill="white" opacity="0.3"/>
      <rect x="22" y="2" width="6" height="14" rx="2" fill="white" opacity="0.3"/>
      <rect x="34" y="2" width="6" height="14" rx="2" fill="white" opacity="0.3"/>
      <rect x="46" y="2" width="6" height="14" rx="2" fill="white" opacity="0.3"/>
      <rect x="58" y="2" width="6" height="14" rx="2" fill="white" opacity="0.3"/>
    </g>
    <text x="55" y="62" text-anchor="middle" font-family="Outfit,sans-serif" font-size="9" font-weight="700" fill="white" opacity="0.9">PRE-</text>
    <text x="55" y="74" text-anchor="middle" font-family="Outfit,sans-serif" font-size="9" font-weight="700" fill="white" opacity="0.9">PROCESSING</text>
    <circle cx="18" cy="18" r="10" fill="white" opacity="0.15"/>
    <text x="18" y="22" text-anchor="middle" font-family="Outfit" font-size="9" font-weight="800" fill="white">02</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M292,100 L322,100" stroke="#74C39A" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>

  <!-- Step 3: Pyrolysis Conversion -->
  <g transform="translate(330, 55)">
    <rect x="0" y="0" width="130" height="90" rx="16" fill="url(#stepGrad3)" opacity="0.97"/>
    <!-- Fire/reactor icon -->
    <g transform="translate(22, 8)">
      <!-- Reactor vessel -->
      <rect x="20" y="5" width="45" height="30" rx="8" fill="rgba(255,255,255,0.12)"/>
      <ellipse cx="42" cy="5" rx="24" ry="6" fill="rgba(255,255,255,0.1)"/>
      <!-- Heat lines -->
      <path d="M30,8 Q26,14 30,20 Q34,26 30,32" stroke="#9DD6B9" stroke-width="1.5" fill="none" opacity="0.6"/>
      <path d="M42,6 Q38,12 42,18 Q46,24 42,30" stroke="#9DD6B9" stroke-width="1.5" fill="none" opacity="0.6"/>
      <path d="M54,8 Q50,14 54,20 Q58,26 54,32" stroke="#9DD6B9" stroke-width="1.5" fill="none" opacity="0.6"/>
      <!-- Temp label -->
      <text x="42" y="48" text-anchor="middle" font-family="Outfit" font-size="9" fill="#AADCC0" font-weight="600">400–700°C</text>
    </g>
    <text x="65" y="66" text-anchor="middle" font-family="Outfit,sans-serif" font-size="9" font-weight="700" fill="white" opacity="0.9">PYROLYSIS</text>
    <text x="65" y="78" text-anchor="middle" font-family="Outfit,sans-serif" font-size="9" font-weight="700" fill="white" opacity="0.9">CONVERSION</text>
    <circle cx="18" cy="18" r="10" fill="white" opacity="0.15"/>
    <text x="18" y="22" text-anchor="middle" font-family="Outfit" font-size="9" font-weight="800" fill="white">03</text>
  </g>

  <!-- Arrow 3 -->
  <path d="M462,100 L492,100" stroke="#74C39A" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>

  <!-- Step 4: Separation -->
  <g transform="translate(500, 55)">
    <rect x="0" y="0" width="130" height="90" rx="16" fill="url(#stepGrad3)" opacity="0.97"/>
    <!-- Separator icon (three streams) -->
    <g transform="translate(15, 10)">
      <path d="M50,5 Q50,18 30,30" stroke="#9DD6B9" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M50,5 Q50,18 50,35" stroke="#AADCC0" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M50,5 Q50,18 70,30" stroke="#74C39A" stroke-width="3" fill="none" stroke-linecap="round"/>
      <circle cx="50" cy="5" r="6" fill="rgba(255,255,255,0.2)"/>
      <!-- Stream labels -->
      <text x="22" y="44" text-anchor="middle" font-family="Outfit" font-size="7" fill="#C9EBDA">GAS</text>
      <text x="50" y="44" text-anchor="middle" font-family="Outfit" font-size="7" fill="#AADCC0">OIL</text>
      <text x="78" y="44" text-anchor="middle" font-family="Outfit" font-size="7" fill="#9DD6B9">CHAR</text>
    </g>
    <text x="65" y="66" text-anchor="middle" font-family="Outfit,sans-serif" font-size="9" font-weight="700" fill="white" opacity="0.9">PRODUCT</text>
    <text x="65" y="78" text-anchor="middle" font-family="Outfit,sans-serif" font-size="9" font-weight="700" fill="white" opacity="0.9">SEPARATION</text>
    <circle cx="18" cy="18" r="10" fill="white" opacity="0.15"/>
    <text x="18" y="22" text-anchor="middle" font-family="Outfit" font-size="9" font-weight="800" fill="white">04</text>
  </g>

  <!-- Arrow 4 -->
  <path d="M632,100 L662,100" stroke="#74C39A" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>

  <!-- Step 5: Products -->
  <g transform="translate(670, 55)">
    <rect x="0" y="0" width="110" height="90" rx="16" fill="url(#stepGrad4)" opacity="0.97"/>
    <!-- Products icon (multiple boxes) -->
    <g transform="translate(12, 8)">
      <rect x="0" y="0" width="28" height="28" rx="5" fill="rgba(255,255,255,0.12)"/>
      <rect x="32" y="0" width="28" height="12" rx="4" fill="rgba(255,255,255,0.1)"/>
      <rect x="32" y="16" width="28" height="12" rx="4" fill="rgba(255,255,255,0.08)"/>
      <text x="14" y="18" text-anchor="middle" font-family="Outfit" font-size="16" fill="#9DD6B9">⬡</text>
    </g>
    <text x="55" y="62" text-anchor="middle" font-family="Outfit,sans-serif" font-size="9" font-weight="700" fill="white" opacity="0.9">FINISHED</text>
    <text x="55" y="74" text-anchor="middle" font-family="Outfit,sans-serif" font-size="9" font-weight="700" fill="white" opacity="0.9">PRODUCTS</text>
    <circle cx="18" cy="18" r="10" fill="white" opacity="0.15"/>
    <text x="18" y="22" text-anchor="middle" font-family="Outfit" font-size="9" font-weight="800" fill="white">05</text>
  </g>

  <!-- Arrow 5 -->
  <path d="M782,100 L812,100" stroke="#74C39A" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>

  <!-- Step 6: Market -->
  <g transform="translate(820, 55)">
    <rect x="0" y="0" width="60" height="90" rx="16" fill="url(#stepGrad4)" opacity="0.97"/>
    <!-- Market/globe icon -->
    <g transform="translate(8, 12)">
      <circle cx="22" cy="22" r="18" fill="none" stroke="#74C39A" stroke-width="2" opacity="0.5"/>
      <path d="M22,4 Q28,22 22,40" stroke="#74C39A" stroke-width="1.5" fill="none" opacity="0.5"/>
      <path d="M22,4 Q16,22 22,40" stroke="#74C39A" stroke-width="1.5" fill="none" opacity="0.5"/>
      <line x1="4" y1="22" x2="40" y2="22" stroke="#74C39A" stroke-width="1.5" opacity="0.5"/>
    </g>
    <text x="30" y="74" text-anchor="middle" font-family="Outfit,sans-serif" font-size="9" font-weight="700" fill="white" opacity="0.9">MARKET</text>
  </g>
</svg>
