<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#EEF8F2"/>
      <stop offset="100%" stop-color="#C9EBDA"/>
    </radialGradient>
    <linearGradient id="bagGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#228B55"/>
      <stop offset="100%" stop-color="#0F4226"/>
    </linearGradient>
    <linearGradient id="soilGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3DA872"/>
      <stop offset="100%" stop-color="#1A7042"/>
    </linearGradient>
    <filter id="drop"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0A2C1A" flood-opacity="0.25"/></filter>
  </defs>

  <rect width="400" height="300" fill="url(#bg)" rx="16"/>

  <!-- Soil base -->
  <ellipse cx="200" cy="258" rx="140" ry="22" fill="#155833" opacity="0.25"/>
  <path d="M60,258 Q200,240 340,258 L340,280 Q200,270 60,280Z" fill="#0F4226" opacity="0.4"/>

  <!-- Fertilizer bag -->
  <g filter="url(#drop)" transform="translate(120,100)">
    <!-- Bag body -->
    <rect x="0" y="40" width="160" height="110" rx="14" fill="url(#bagGrad)"/>
    <!-- Bag top fold -->
    <path d="M15,40 L145,40 L135,10 Q80,-5 25,10 Z" fill="#155833"/>
    <rect x="15" y="38" width="130" height="6" rx="3" fill="#3DA872" opacity="0.5"/>

    <!-- Bag label area -->
    <rect x="20" y="60" width="120" height="70" rx="8" fill="rgba(255,255,255,0.12)"/>
    <!-- Leaf icon on label -->
    <path d="M80,75 C65,88 60,108 80,115 C100,122 108,102 95,85 Q90,75 80,75Z" fill="#74C39A" opacity="0.8"/>
    <line x1="80" y1="115" x2="80" y2="130" stroke="#74C39A" stroke-width="2"/>

    <!-- Text lines -->
    <rect x="30" y="118" width="100" height="5" rx="2.5" fill="#74C39A" opacity="0.4"/>
    <rect x="40" y="128" width="80" height="4" rx="2" fill="#74C39A" opacity="0.3"/>

    <!-- Stars/nutrients -->
    <text x="30" y="92" font-size="10" fill="#AADCC0" opacity="0.7">★ N ★ P ★ K</text>
  </g>

  <!-- Pouring granules -->
  <g opacity="0.85">
    <circle cx="200" cy="195" r="4" fill="#3DA872"/>
    <circle cx="215" cy="207" r="3.5" fill="#228B55"/>
    <circle cx="190" cy="210" r="3" fill="#3DA872"/>
    <circle cx="205" cy="220" r="4" fill="#1A7042"/>
    <circle cx="222" cy="218" r="3" fill="#3DA872"/>
    <circle cx="185" cy="223" r="3.5" fill="#228B55"/>
    <circle cx="210" cy="232" r="3" fill="#3DA872"/>
    <circle cx="195" cy="235" r="4" fill="#1A7042"/>
    <circle cx="225" cy="230" r="3" fill="#3DA872"/>
  </g>

  <!-- Plant sprouts from fertilized soil -->
  <g transform="translate(100, 245)">
    <line x1="0" y1="0" x2="-5" y2="-40" stroke="#228B55" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M-5,-40 C-20,-55 -28,-42 -18,-33 Q-12,-28 -5,-40Z" fill="#3DA872"/>

    <line x1="20" y1="0" x2="18" y2="-55" stroke="#1A7042" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M18,-55 C33,-72 40,-56 30,-45 Q24,-39 18,-55Z" fill="#228B55"/>
    <path d="M18,-35 C8,-45 4,-35 12,-28 Q16,-24 18,-35Z" fill="#3DA872"/>
  </g>
  <g transform="translate(290, 248)">
    <line x1="0" y1="0" x2="5" y2="-45" stroke="#228B55" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M5,-45 C20,-62 28,-47 18,-37 Q12,-32 5,-45Z" fill="#3DA872"/>
    <path d="M5,-28 C15,-40 20,-30 12,-22 Q8,-17 5,-28Z" fill="#228B55"/>
  </g>

  <!-- Label -->
  <rect x="105" y="262" width="190" height="30" rx="15" fill="rgba(21,88,51,0.1)" stroke="rgba(21,88,51,0.18)" stroke-width="1"/>
  <text x="200" y="282" text-anchor="middle" font-family="Outfit,sans-serif" font-size="11" font-weight="700" fill="#155833">SLOW-RELEASE FERTILIZER</text>
</svg>
