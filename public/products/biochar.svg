<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#EEF8F2"/>
      <stop offset="100%" stop-color="#C9EBDA"/>
    </radialGradient>
    <radialGradient id="charcoalGrad" cx="30%" cy="25%" r="75%">
      <stop offset="0%" stop-color="#2A4A35"/>
      <stop offset="50%" stop-color="#1A3028"/>
      <stop offset="100%" stop-color="#0A1810"/>
    </radialGradient>
    <radialGradient id="soilGrad" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#155833"/>
      <stop offset="100%" stop-color="#0A2C1A"/>
    </radialGradient>
    <filter id="softshadow">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0A1810" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="400" height="300" fill="url(#bg)" rx="16"/>

  <!-- Ground bowl -->
  <ellipse cx="200" cy="240" rx="130" ry="28" fill="#155833" opacity="0.3"/>

  <!-- Biochar heap -->
  <g filter="url(#softshadow)">
    <ellipse cx="200" cy="240" rx="120" ry="22" fill="url(#charcoalGrad)"/>
    <path d="M80,240 Q100,160 200,145 Q300,160 320,240 Z" fill="url(#charcoalGrad)"/>
    <!-- Texture cracks / surface detail -->
    <path d="M160,200 Q170,185 180,200" stroke="#3DA872" stroke-width="1.5" fill="none" opacity="0.3"/>
    <path d="M210,190 Q220,175 235,188" stroke="#3DA872" stroke-width="1.5" fill="none" opacity="0.3"/>
    <path d="M185,220 Q200,205 215,220" stroke="#3DA872" stroke-width="1" fill="none" opacity="0.2"/>
    <path d="M145,220 Q155,210 165,220" stroke="#3DA872" stroke-width="1" fill="none" opacity="0.25"/>
    <path d="M240,210 Q250,200 262,210" stroke="#3DA872" stroke-width="1" fill="none" opacity="0.25"/>

    <!-- Carbon sparkle dots -->
    <circle cx="175" cy="185" r="3" fill="#3DA872" opacity="0.5"/>
    <circle cx="220" cy="178" r="2.5" fill="#4DB880" opacity="0.4"/>
    <circle cx="248" cy="196" r="2" fill="#3DA872" opacity="0.45"/>
    <circle cx="155" cy="208" r="2" fill="#228B55" opacity="0.4"/>
    <circle cx="200" cy="165" r="3.5" fill="#3DA872" opacity="0.5"/>
  </g>

  <!-- CO2 molecule floating -->
  <g transform="translate(290, 100)" opacity="0.7">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#1A7042" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="Outfit" font-size="12" font-weight="700" fill="#1A7042">CO₂</text>
    <!-- Arrow down into soil -->
    <line x1="0" y1="20" x2="0" y2="45" stroke="#1A7042" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="8" y="38" font-family="Work Sans" font-size="9" fill="#228B55">stored</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#1A7042"/>
    </marker>
  </defs>

  <!-- Plant sprout from biochar -->
  <g transform="translate(200, 145)">
    <!-- Stem -->
    <path d="M0,0 Q-5,-25 -10,-45" stroke="#228B55" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M0,0 Q5,-30 15,-50" stroke="#1A7042" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Leaves -->
    <path d="M-10,-45 C-30,-65 -45,-50 -30,-38 Q-20,-32 -10,-45Z" fill="#3DA872"/>
    <path d="M15,-50 C35,-70 48,-52 32,-41 Q22,-35 15,-50Z" fill="#228B55"/>
    <!-- Small leaf -->
    <path d="M-2,-25 C-16,-35 -20,-25 -10,-18 Q-6,-14 -2,-25Z" fill="#4DB880"/>
  </g>

  <!-- Label -->
  <rect x="130" y="255" width="140" height="32" rx="16" fill="rgba(21,88,51,0.12)" stroke="rgba(21,88,51,0.2)" stroke-width="1"/>
  <text x="200" y="276" text-anchor="middle" font-family="Outfit,sans-serif" font-size="12" font-weight="700" fill="#155833">BIOCHAR</text>
</svg>
