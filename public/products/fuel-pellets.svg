<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#E8F7EE"/>
      <stop offset="100%" stop-color="#C9EBDA"/>
    </radialGradient>
    <radialGradient id="pelletGrad" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#6ABF96"/>
      <stop offset="60%" stop-color="#228B55"/>
      <stop offset="100%" stop-color="#0F4226"/>
    </radialGradient>
    <radialGradient id="pelletGrad2" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#3DA872"/>
      <stop offset="60%" stop-color="#1A7042"/>
      <stop offset="100%" stop-color="#0A2C1A"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#0F4226" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="300" fill="url(#bgGrad)" rx="16"/>
  <circle cx="200" cy="150" r="130" fill="rgba(26,112,66,0.06)"/>
  <circle cx="200" cy="150" r="90" fill="rgba(26,112,66,0.05)"/>

  <!-- Pile of pellets -->
  <g filter="url(#shadow)">
    <!-- Bottom row -->
    <ellipse cx="130" cy="210" rx="28" ry="12" fill="url(#pelletGrad)"/>
    <rect x="102" y="172" width="56" height="38" rx="14" fill="url(#pelletGrad)"/>
    <ellipse cx="130" cy="172" rx="28" ry="12" fill="#3DA872"/>

    <ellipse cx="185" cy="215" rx="28" ry="12" fill="url(#pelletGrad2)"/>
    <rect x="157" y="177" width="56" height="38" rx="14" fill="url(#pelletGrad2)"/>
    <ellipse cx="185" cy="177" rx="28" ry="12" fill="#4DB880"/>

    <ellipse cx="240" cy="210" rx="28" ry="12" fill="url(#pelletGrad)"/>
    <rect x="212" y="172" width="56" height="38" rx="14" fill="url(#pelletGrad)"/>
    <ellipse cx="240" cy="172" rx="28" ry="12" fill="#3DA872"/>

    <ellipse cx="295" cy="215" rx="28" ry="12" fill="url(#pelletGrad2)"/>
    <rect x="267" y="177" width="56" height="38" rx="14" fill="url(#pelletGrad2)"/>
    <ellipse cx="295" cy="177" rx="28" ry="12" fill="#4DB880"/>

    <!-- Middle row -->
    <ellipse cx="158" cy="175" rx="28" ry="12" fill="url(#pelletGrad2)"/>
    <rect x="130" y="137" width="56" height="38" rx="14" fill="url(#pelletGrad2)"/>
    <ellipse cx="158" cy="137" rx="28" ry="12" fill="#5CC890"/>

    <ellipse cx="213" cy="170" rx="28" ry="12" fill="url(#pelletGrad)"/>
    <rect x="185" y="132" width="56" height="38" rx="14" fill="url(#pelletGrad)"/>
    <ellipse cx="213" cy="132" rx="28" ry="12" fill="#4DB880"/>

    <ellipse cx="268" cy="175" rx="28" ry="12" fill="url(#pelletGrad2)"/>
    <rect x="240" y="137" width="56" height="38" rx="14" fill="url(#pelletGrad2)"/>
    <ellipse cx="268" cy="137" rx="28" ry="12" fill="#5CC890"/>

    <!-- Top row -->
    <ellipse cx="185" cy="135" rx="28" ry="12" fill="url(#pelletGrad)"/>
    <rect x="157" y="97" width="56" height="38" rx="14" fill="url(#pelletGrad)"/>
    <ellipse cx="185" cy="97" rx="28" ry="12" fill="#6ABF96"/>

    <ellipse cx="240" cy="130" rx="28" ry="12" fill="url(#pelletGrad2)"/>
    <rect x="212" y="92" width="56" height="38" rx="14" fill="url(#pelletGrad2)"/>
    <ellipse cx="240" cy="92" rx="28" ry="12" fill="#74C39A"/>

    <!-- Peak -->
    <ellipse cx="212" cy="95" rx="28" ry="12" fill="url(#pelletGrad)"/>
    <rect x="184" y="62" width="56" height="33" rx="14" fill="url(#pelletGrad)"/>
    <ellipse cx="212" cy="62" rx="28" ry="12" fill="#8DD4A8"/>
  </g>

  <!-- Glow at top pellet -->
  <ellipse cx="212" cy="62" rx="35" ry="18" fill="#74C39A" opacity="0.25" filter="url(#glow)"/>

  <!-- Label -->
  <rect x="120" y="240" width="160" height="36" rx="18" fill="rgba(21,88,51,0.12)" stroke="rgba(21,88,51,0.2)" stroke-width="1"/>
  <text x="200" y="263" text-anchor="middle" font-family="Outfit,sans-serif" font-size="13" font-weight="700" fill="#155833">FUEL PELLETS</text>
</svg>
