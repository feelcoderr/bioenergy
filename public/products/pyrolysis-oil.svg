<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#EEF8F2"/>
      <stop offset="100%" stop-color="#C9EBDA"/>
    </radialGradient>
    <linearGradient id="bottleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3DA872"/>
      <stop offset="50%" stop-color="#228B55"/>
      <stop offset="100%" stop-color="#1A7042"/>
    </linearGradient>
    <linearGradient id="oilGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#155833"/>
      <stop offset="50%" stop-color="#0F4226"/>
      <stop offset="100%" stop-color="#0A2C1A"/>
    </linearGradient>
    <linearGradient id="oilSheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3DA872" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#155833" stop-opacity="0"/>
    </linearGradient>
    <filter id="drop"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0A2C1A" flood-opacity="0.3"/></filter>
  </defs>

  <rect width="400" height="300" fill="url(#bg)" rx="16"/>

  <!-- Large flask/beaker -->
  <g filter="url(#drop)" transform="translate(120,40)">
    <!-- Flask neck -->
    <rect x="62" y="0" width="36" height="50" rx="8" fill="url(#bottleGrad)"/>
    <ellipse cx="80" cy="0" rx="22" ry="7" fill="#3DA872"/>
    <!-- Stopper -->
    <rect x="68" y="-6" width="24" height="10" rx="4" fill="#155833"/>

    <!-- Flask body -->
    <path d="M50,50 Q20,80 10,130 Q5,160 80,175 Q155,160 150,130 Q140,80 110,50 Z" fill="url(#bottleGrad)" opacity="0.85"/>
    <!-- Glass highlight -->
    <path d="M56,55 Q42,80 38,115" stroke="#74C39A" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round"/>

    <!-- Oil inside -->
    <clipPath id="flask">
      <path d="M52,52 Q22,82 12,130 Q7,158 80,173 Q153,158 148,130 Q138,82 108,52 Z"/>
    </clipPath>
    <path d="M20,120 Q80,108 140,120 L148,173 Q80,183 12,173 Z" fill="url(#oilGrad)" clip-path="url(#flask)"/>
    <!-- Oil surface sheen -->
    <ellipse cx="80" cy="118" rx="60" ry="8" fill="url(#oilSheen)" clip-path="url(#flask)"/>
    <!-- Oil drop effect on surface -->
    <ellipse cx="65" cy="120" rx="12" ry="4" fill="#3DA872" opacity="0.25"/>
    <ellipse cx="100" cy="122" rx="10" ry="3" fill="#3DA872" opacity="0.2"/>
  </g>

  <!-- Small vials/test tubes right side -->
  <g transform="translate(275, 80)">
    <rect x="0" y="0" width="24" height="90" rx="12" fill="url(#bottleGrad)" opacity="0.9"/>
    <rect x="2" y="68" width="20" height="22" rx="10" fill="url(#oilGrad)"/>
    <ellipse cx="12" cy="0" rx="12" ry="5" fill="#3DA872"/>
    <rect x="4" y="-6" width="16" height="8" rx="3" fill="#155833"/>

    <rect x="34" y="20" width="24" height="80" rx="12" fill="url(#bottleGrad)" opacity="0.8"/>
    <rect x="36" y="60" width="20" height="40" rx="10" fill="url(#oilGrad)"/>
    <ellipse cx="46" cy="20" rx="12" ry="5" fill="#3DA872"/>
    <rect x="38" y="14" width="16" height="8" rx="3" fill="#155833"/>
  </g>

  <!-- Molecule diagram -->
  <g transform="translate(310, 140)" opacity="0.6" stroke="#1A7042" stroke-width="1.5" fill="none">
    <circle cx="30" cy="30" r="10" fill="#228B55" fill-opacity="0.3"/>
    <circle cx="10" cy="55" r="8" fill="#1A7042" fill-opacity="0.3"/>
    <circle cx="52" cy="55" r="8" fill="#155833" fill-opacity="0.3"/>
    <circle cx="30" cy="72" r="7" fill="#228B55" fill-opacity="0.3"/>
    <line x1="30" y1="40" x2="10" y2="47"/>
    <line x1="30" y1="40" x2="52" y2="47"/>
    <line x1="10" y1="63" x2="30" y2="65"/>
    <line x1="52" y1="63" x2="30" y2="65"/>
    <text x="30" y="34" text-anchor="middle" font-family="Outfit" font-size="8" fill="#1A7042" font-weight="700">C</text>
    <text x="10" y="59" text-anchor="middle" font-family="Outfit" font-size="7" fill="#1A7042">H</text>
    <text x="52" y="59" text-anchor="middle" font-family="Outfit" font-size="7" fill="#1A7042">O</text>
  </g>

  <!-- Drip -->
  <ellipse cx="200" cy="248" rx="55" ry="9" fill="#0A2C1A" opacity="0.12"/>
  <path d="M193,215 Q198,230 200,248 Q202,230 207,215" fill="#0F4226" opacity="0.7"/>

  <!-- Label -->
  <rect x="85" y="262" width="230" height="30" rx="15" fill="rgba(21,88,51,0.1)" stroke="rgba(21,88,51,0.18)" stroke-width="1"/>
  <text x="200" y="282" text-anchor="middle" font-family="Outfit,sans-serif" font-size="12" font-weight="700" fill="#155833">PYROLYSIS OIL DERIVATIVES</text>
</svg>
